<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i18n Test</title>
</head>
<body>
    <h1>i18n System Test</h1>
    <div id="test-results"></div>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Test Scripts -->
    <script type="text/babel">
        // Test locales
        console.log('Testing locales...');
        
        // Test en locale
        if (typeof window.en !== 'undefined') {
            console.log('✅ EN locale loaded:', window.en.nav.home);
        } else {
            console.log('❌ EN locale not found');
        }
        
        // Test es locale
        if (typeof window.es !== 'undefined') {
            console.log('✅ ES locale loaded:', window.es.nav.home);
        } else {
            console.log('❌ ES locale not found');
        }
        
        // Test translation function
        if (typeof window.t !== 'undefined') {
            console.log('✅ Translation function available');
            console.log('Test translation:', window.t('nav.home'));
        } else {
            console.log('❌ Translation function not found');
        }
        
        // Display results
        const results = document.getElementById('test-results');
        results.innerHTML = `
            <h2>Test Results:</h2>
            <p>EN locale: ${typeof window.en !== 'undefined' ? '✅ Loaded' : '❌ Not found'}</p>
            <p>ES locale: ${typeof window.es !== 'undefined' ? '✅ Loaded' : '❌ Not found'}</p>
            <p>Translation function: ${typeof window.t !== 'undefined' ? '✅ Available' : '❌ Not found'}</p>
            <p>Current language: ${window.currentLanguage || 'Not set'}</p>
        `;
    </script>

    <!-- Load locales -->
    <script type="text/babel" src="./src/i18n/locales/en.js"></script>
    <script type="text/babel" src="./src/i18n/locales/es.js"></script>
    
    <!-- Load i18n system -->
    <script type="text/babel" src="./src/i18n/useTranslation.js"></script>
</body>
</html>
