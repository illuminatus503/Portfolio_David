<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .warning { background-color: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
    </style>
</head>
<body>
    <h1>Website Functionality Test</h1>
    <div id="test-results"></div>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Test Scripts -->
    <script type="text/babel">
        const results = document.getElementById('test-results');
        
        function addResult(message, type = 'success') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            results.appendChild(div);
        }

        // Test 1: Check if locales are loaded
        console.log('Testing locales...');
        if (typeof window.en !== 'undefined') {
            addResult('✅ EN locale loaded successfully');
            console.log('EN locale keys:', Object.keys(window.en));
        } else {
            addResult('❌ EN locale not found', 'error');
        }
        
        if (typeof window.es !== 'undefined') {
            addResult('✅ ES locale loaded successfully');
            console.log('ES locale keys:', Object.keys(window.es));
        } else {
            addResult('❌ ES locale not found', 'error');
        }

        // Test 2: Check if useTranslation is available
        if (typeof window.useTranslation !== 'undefined') {
            addResult('✅ useTranslation hook available');
        } else {
            addResult('❌ useTranslation hook not found', 'error');
        }

        // Test 3: Check if components are available
        const components = ['Navbar', 'Hero', 'About', 'Skills', 'Projects', 'Contact', 'Footer'];
        components.forEach(component => {
            if (typeof window[component] !== 'undefined') {
                addResult(`✅ ${component} component available`);
            } else {
                addResult(`❌ ${component} component not found`, 'error');
            }
        });

        // Test 4: Check if App is available
        if (typeof window.App !== 'undefined') {
            addResult('✅ App component available');
        } else {
            addResult('❌ App component not found', 'error');
        }

        // Test 5: Check if useAppContext is available
        if (typeof window.useAppContext !== 'undefined') {
            addResult('✅ useAppContext hook available');
        } else {
            addResult('❌ useAppContext hook not found', 'error');
        }

        // Test 6: Test translation function
        if (typeof window.useTranslation === 'function') {
            try {
                // This will fail because we need React context, but we can test the structure
                addResult('✅ useTranslation function structure correct');
            } catch (error) {
                addResult(`⚠️ useTranslation test failed: ${error.message}`, 'warning');
            }
        } else {
            addResult('❌ useTranslation is not a function', 'error');
        }

        // Test 7: Check if CSS is loaded
        const cssLoaded = document.querySelector('link[href*="output.css"]');
        if (cssLoaded) {
            addResult('✅ CSS file loaded');
        } else {
            addResult('❌ CSS file not found', 'error');
        }

        // Summary
        setTimeout(() => {
            const totalTests = results.children.length;
            const passedTests = results.querySelectorAll('.success').length;
            const failedTests = results.querySelectorAll('.error').length;
            const warnings = results.querySelectorAll('.warning').length;
            
            addResult(`📊 Test Summary: ${passedTests} passed, ${failedTests} failed, ${warnings} warnings out of ${totalTests} total tests`);
            
            if (failedTests === 0) {
                addResult('🎉 All critical tests passed! Website should be working correctly.');
            } else {
                addResult('⚠️ Some tests failed. Check the errors above.', 'warning');
            }
        }, 1000);
    </script>

    <!-- Load locales -->
    <script type="text/babel" src="./src/i18n/locales/en.js"></script>
    <script type="text/babel" src="./src/i18n/locales/es.js"></script>
    
    <!-- Load i18n system -->
    <script type="text/babel" src="./src/i18n/useTranslation.js"></script>
    
    <!-- Load App -->
    <script type="text/babel" src="./src/App.jsx"></script>
    
    <!-- Load components -->
    <script type="text/babel" src="./src/components/Navbar.jsx"></script>
    <script type="text/babel" src="./src/components/Hero.jsx"></script>
    <script type="text/babel" src="./src/components/About.jsx"></script>
    <script type="text/babel" src="./src/components/Skills.jsx"></script>
    <script type="text/babel" src="./src/components/Projects.jsx"></script>
    <script type="text/babel" src="./src/components/Contact.jsx"></script>
    <script type="text/babel" src="./src/components/Footer.jsx"></script>
</body>
</html>
