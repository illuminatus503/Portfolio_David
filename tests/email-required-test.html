<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Required Test</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="../dist/output.css" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <!-- Load locales first -->
    <script type="text/babel" src="../src/i18n/locales/en.js"></script>
    <script type="text/babel" src="../src/i18n/locales/es.js"></script>
    
    <!-- Load i18n system -->
    <script type="text/babel" src="../src/i18n/useTranslation.js"></script>
    
    <!-- Load validation module -->
    <script type="text/babel" src="../src/utils/validation.js"></script>
    
    <!-- Load components -->
    <script type="text/babel" src="../src/components/Contact.jsx"></script>

    <script type="text/babel">
        const { createRoot } = ReactDOM;

        function TestApp() {
            return (
                <div className="min-h-screen bg-gray-100 p-8">
                    <div className="max-w-4xl mx-auto">
                        <h1 className="text-3xl font-bold mb-8 text-center">Email Required Test</h1>
                        
                        <div className="bg-white rounded-lg shadow-lg p-6">
                            <h2 className="text-xl font-semibold mb-4">Test Cases:</h2>
                            <ul className="list-disc list-inside space-y-2 mb-6">
                                <li>✅ Email label should show asterisk (*)</li>
                                <li>✅ Email field should be required</li>
                                <li>✅ Error message should appear when email is empty and field is touched</li>
                                <li>✅ Error message should appear when email format is invalid</li>
                                <li>✅ Submit button should be disabled when email is invalid</li>
                            </ul>
                            
                            <Contact />
                        </div>
                    </div>
                </div>
            );
        }

        // Render the test
        const root = createRoot(document.getElementById('root'));
        root.render(<TestApp />);
    </script>
</body>
</html>
