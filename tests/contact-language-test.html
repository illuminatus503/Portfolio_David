<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form Language Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-panel { 
            position: fixed; 
            top: 10px; 
            right: 10px; 
            width: 400px; 
            background: #f8f9fa; 
            border: 1px solid #dee2e6; 
            border-radius: 5px; 
            padding: 15px; 
            font-size: 12px; 
            z-index: 1000;
        }
        .status { margin: 5px 0; padding: 5px; border-radius: 3px; }
        .status.success { background: #d4edda; color: #155724; }
        .status.warning { background: #fff3cd; color: #856404; }
        .status.error { background: #f8d7da; color: #721c24; }
        .log { 
            max-height: 200px; 
            overflow-y: auto; 
            background: #000; 
            color: #0f0; 
            padding: 10px; 
            font-family: monospace; 
            font-size: 10px;
        }
        .contact-form { 
            margin: 20px 0; 
            padding: 20px; 
            border: 2px solid #007bff; 
            border-radius: 8px; 
            background: #f8f9fa;
        }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 14px;
        }
        .button { 
            padding: 10px 20px; 
            margin: 5px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 14px;
        }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-warning { background: #ffc107; color: black; }
    </style>
</head>
<body>
    <div class="test-panel">
        <h3>📝 Contact Form Language Test</h3>
        <div id="status"></div>
        <div class="log" id="log"></div>
        <button class="button btn-primary" onclick="testContactForm()">Test Contact Form</button>
        <button class="button btn-success" onclick="testLanguageChange()">Test Language Change</button>
        <button class="button btn-warning" onclick="clearLog()">Clear Log</button>
    </div>

    <h1>Contact Form Language Test</h1>
    
    <div class="contact-form">
        <h2>Contact Form - Type here to test</h2>
        <form id="contact-form">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Your name" />
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" />
            </div>
            <div class="form-group">
                <label for="subject">Subject:</label>
                <input type="text" id="subject" name="subject" placeholder="Message subject" />
            </div>
            <div class="form-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="4" placeholder="Your message here..."></textarea>
            </div>
        </form>
    </div>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Load locales first -->
    <script type="text/babel" src="./src/i18n/locales/en.js"></script>
    <script type="text/babel" src="./src/i18n/locales/es.js"></script>
    
    <!-- Load i18n system -->
    <script type="text/babel" src="./src/i18n/useTranslation.js"></script>

    <script type="text/babel">
        const statusDiv = document.getElementById('status');
        const logDiv = document.getElementById('log');
        
        let lastLanguage = null;
        let languageChanges = 0;
        let formInputs = 0;
        
        function addStatus(message, type = 'success') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = message;
            statusDiv.appendChild(div);
            
            // Keep only last 5 status messages
            while (statusDiv.children.length > 5) {
                statusDiv.removeChild(statusDiv.firstChild);
            }
        }

        function addLog(message) {
            const div = document.createElement('div');
            div.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
            logDiv.appendChild(div);
            
            // Keep only last 20 log messages
            while (logDiv.children.length > 20) {
                logDiv.removeChild(logDiv.firstChild);
            }
            
            // Auto-scroll to bottom
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            logDiv.innerHTML = '';
            addLog('Log cleared');
        }

        function checkLanguageState() {
            const currentLang = window.getLanguage ? window.getLanguage() : (window.currentLanguage || 'unknown');
            const localStorageLang = localStorage.getItem('lang') || 'unknown';
            
            // Check for language changes
            if (lastLanguage && lastLanguage !== currentLang) {
                languageChanges++;
                addLog(`⚠️ Language changed from ${lastLanguage} to ${currentLang} (change #${languageChanges})`);
                addStatus(`Language changed: ${lastLanguage} → ${currentLang}`, 'warning');
            }
            
            lastLanguage = currentLang;
            
            // Check for inconsistencies
            if (currentLang !== localStorageLang) {
                addStatus(`❌ Mismatch: current=${currentLang}, localStorage=${localStorageLang}`, 'error');
            } else {
                addStatus(`✅ Language sync: ${currentLang}`, 'success');
            }
            
            return { currentLang, localStorageLang, languageChanges };
        }

        function testContactForm() {
            addLog('🧪 Testing contact form interaction...');
            formInputs++;
            
            // Simulate typing in contact form fields
            const nameField = document.getElementById('name');
            const emailField = document.getElementById('email');
            const subjectField = document.getElementById('subject');
            const messageField = document.getElementById('message');
            
            if (nameField && emailField && subjectField && messageField) {
                // Simulate typing
                nameField.value = 'Test User ' + formInputs;
                nameField.dispatchEvent(new Event('input'));
                
                setTimeout(() => {
                    emailField.value = 'test' + formInputs + '@example.com';
                    emailField.dispatchEvent(new Event('input'));
                }, 300);
                
                setTimeout(() => {
                    subjectField.value = 'Test Subject ' + formInputs;
                    subjectField.dispatchEvent(new Event('input'));
                }, 600);
                
                setTimeout(() => {
                    messageField.value = 'This is test message ' + formInputs;
                    messageField.dispatchEvent(new Event('input'));
                }, 900);
                
                addStatus(`✅ Contact form test #${formInputs} completed`, 'success');
            } else {
                addStatus('❌ Contact form elements not found', 'error');
            }
        }

        function testLanguageChange() {
            addLog('🔄 Testing language change...');
            
            const currentLang = window.getLanguage ? window.getLanguage() : (window.currentLanguage || 'en');
            const newLang = currentLang === 'es' ? 'en' : 'es';
            
            if (window.setLanguage) {
                window.setLanguage(newLang);
                addStatus(`✅ Language changed to ${newLang}`, 'success');
            } else {
                addStatus('❌ setLanguage function not available', 'error');
            }
        }

        // Monitor language state every 100ms
        setInterval(() => {
            checkLanguageState();
        }, 100);

        // Monitor form input events
        document.addEventListener('input', (e) => {
            if (e.target.id && ['name', 'email', 'subject', 'message'].includes(e.target.id)) {
                addLog(`📝 Contact form input: ${e.target.id} = "${e.target.value}"`);
            }
        });

        // Monitor form focus events
        document.addEventListener('focus', (e) => {
            if (e.target.id && ['name', 'email', 'subject', 'message'].includes(e.target.id)) {
                addLog(`🎯 Contact form focus: ${e.target.id}`);
            }
        });

        // Monitor form blur events
        document.addEventListener('blur', (e) => {
            if (e.target.id && ['name', 'email', 'subject', 'message'].includes(e.target.id)) {
                addLog(`👁️ Contact form blur: ${e.target.id}`);
            }
        });

        // Initial status
        setTimeout(() => {
            addStatus('🚀 Contact form language test initialized', 'success');
            addLog('Language monitoring started');
        }, 1000);
    </script>
</body>
</html>
