<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Change Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .warning { background-color: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }
    </style>
</head>
<body>
    <h1>Language Change Test</h1>
    <div id="test-results"></div>
    <div id="language-test" class="test-section">
        <h2>Language Test</h2>
        <button class="btn-primary" onclick="testLanguageChange()">Test Language Change</button>
        <button class="btn-secondary" onclick="testTranslations()">Test Translations</button>
        <div id="translation-output"></div>
    </div>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Load locales first -->
    <script type="text/babel" src="./src/i18n/locales/en.js"></script>
    <script type="text/babel" src="./src/i18n/locales/es.js"></script>
    
    <!-- Load i18n system -->
    <script type="text/babel" src="./src/i18n/useTranslation.js"></script>

    <!-- Test Scripts -->
    <script type="text/babel">
        const results = document.getElementById('test-results');
        const translationOutput = document.getElementById('translation-output');
        
        function addResult(message, type = 'success') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            results.appendChild(div);
        }

        function testLanguageChange() {
            addResult('🔍 Testing language change functionality...', 'info');
            
            // Test if locales are loaded
            if (typeof window.en === 'object' && typeof window.es === 'object') {
                addResult('✅ Locales loaded successfully');
                console.log('EN keys:', Object.keys(window.en));
                console.log('ES keys:', Object.keys(window.es));
            } else {
                addResult('❌ Locales not loaded', 'error');
                return;
            }

            // Test translation function
            if (typeof window.t === 'function') {
                addResult('✅ Translation function available');
            } else {
                addResult('❌ Translation function not available', 'error');
                return;
            }

            // Test language switching
            const testKeys = ['nav.home', 'nav.about', 'contact.title'];
            
            // Test English
            window.currentLanguage = 'en';
            testKeys.forEach(key => {
                const translation = window.t(key);
                console.log(`EN ${key}:`, translation);
                if (translation && translation !== key) {
                    addResult(`✅ EN translation for ${key}: ${translation}`);
                } else {
                    addResult(`❌ EN translation failed for ${key}`, 'error');
                }
            });

            // Test Spanish
            window.currentLanguage = 'es';
            testKeys.forEach(key => {
                const translation = window.t(key);
                console.log(`ES ${key}:`, translation);
                if (translation && translation !== key) {
                    addResult(`✅ ES translation for ${key}: ${translation}`);
                } else {
                    addResult(`❌ ES translation failed for ${key}`, 'error');
                }
            });

            addResult('🎯 Language change test completed');
        }

        function testTranslations() {
            translationOutput.innerHTML = '<h3>Translation Test Results:</h3>';
            
            const testKeys = [
                'nav.home', 'nav.about', 'nav.skills', 'nav.projects', 'nav.contact',
                'hero.name', 'hero.role', 'hero.tagline',
                'about.title', 'about.brief',
                'contact.title', 'contact.sendMessage'
            ];

            // Test both languages
            ['en', 'es'].forEach(lang => {
                window.currentLanguage = lang;
                const langDiv = document.createElement('div');
                langDiv.innerHTML = `<h4>${lang.toUpperCase()} Translations:</h4>`;
                
                testKeys.forEach(key => {
                    const translation = window.t(key);
                    const div = document.createElement('div');
                    div.innerHTML = `<strong>${key}:</strong> ${translation}`;
                    langDiv.appendChild(div);
                });
                
                translationOutput.appendChild(langDiv);
            });
        }

        // Auto-run basic tests
        setTimeout(() => {
            addResult('🚀 Starting language system tests...', 'info');
            
            // Check if everything is loaded
            if (typeof window.en === 'object' && typeof window.es === 'object' && typeof window.t === 'function') {
                addResult('✅ All language system components loaded');
                testLanguageChange();
            } else {
                addResult('❌ Language system not properly loaded', 'error');
            }
        }, 1000);
    </script>
</body>
</html>
