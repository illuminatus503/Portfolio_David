<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Language Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; background-color: #007bff; color: white; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h1>Simple Language Test</h1>
    <div id="results"></div>
    
    <div class="test-section">
        <h2>Test Language Change</h2>
        <button onclick="testLanguage()">Test Language System</button>
        <button onclick="changeLanguage('en')">Set English</button>
        <button onclick="changeLanguage('es')">Set Spanish</button>
        <div id="output"></div>
    </div>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Load locales first -->
    <script type="text/babel" src="./src/i18n/locales/en.js"></script>
    <script type="text/babel" src="./src/i18n/locales/es.js"></script>
    
    <!-- Load i18n system -->
    <script type="text/babel" src="./src/i18n/useTranslation.js"></script>

    <script type="text/babel">
        const results = document.getElementById('results');
        const output = document.getElementById('output');
        
        function addResult(message, type = 'success') {
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.textContent = message;
            results.appendChild(div);
        }

        function testLanguage() {
            addResult('Testing language system...');
            
            // Check if locales are loaded
            if (window.en && window.es) {
                addResult('✅ Locales loaded');
                console.log('EN:', window.en.nav);
                console.log('ES:', window.es.nav);
            } else {
                addResult('❌ Locales not loaded', 'error');
                return;
            }
            
            // Check if t function is available
            if (typeof window.t === 'function') {
                addResult('✅ Translation function available');
            } else {
                addResult('❌ Translation function not available', 'error');
                return;
            }
            
            // Test translations
            const testKey = 'nav.home';
            const enResult = window.t(testKey);
            addResult(`EN translation: ${enResult}`);
            
            window.currentLanguage = 'es';
            const esResult = window.t(testKey);
            addResult(`ES translation: ${esResult}`);
        }

        function changeLanguage(lang) {
            window.currentLanguage = lang;
            addResult(`Language changed to: ${lang}`);
            
            // Test a few translations
            const testKeys = ['nav.home', 'nav.about', 'contact.title'];
            output.innerHTML = `<h3>Translations for ${lang.toUpperCase()}:</h3>`;
            
            testKeys.forEach(key => {
                const translation = window.t(key);
                const div = document.createElement('div');
                div.innerHTML = `<strong>${key}:</strong> ${translation}`;
                output.appendChild(div);
            });
        }

        // Auto-test on load
        setTimeout(() => {
            testLanguage();
        }, 1000);
    </script>
</body>
</html>
