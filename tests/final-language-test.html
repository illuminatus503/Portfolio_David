<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Language Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-panel { 
            position: fixed; 
            top: 10px; 
            right: 10px; 
            width: 350px; 
            background: #f8f9fa; 
            border: 1px solid #dee2e6; 
            border-radius: 5px; 
            padding: 15px; 
            font-size: 12px; 
            z-index: 1000;
        }
        .status { margin: 5px 0; padding: 5px; border-radius: 3px; }
        .status.success { background: #d4edda; color: #155724; }
        .status.warning { background: #fff3cd; color: #856404; }
        .status.error { background: #f8d7da; color: #721c24; }
        .log { 
            max-height: 150px; 
            overflow-y: auto; 
            background: #000; 
            color: #0f0; 
            padding: 10px; 
            font-family: monospace; 
            font-size: 10px;
        }
        .form-test { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; }
        .button { padding: 8px 16px; margin: 5px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
    </style>
</head>
<body>
    <div class="test-panel">
        <h3>🎯 Final Language Test</h3>
        <div id="status"></div>
        <div class="log" id="log"></div>
        <button class="button btn-primary" onclick="testFormInteraction()">Test Form Input</button>
        <button class="button btn-success" onclick="testLanguageChange()">Test Language Change</button>
    </div>

    <h1>Final Language Test</h1>
    
    <div class="form-test">
        <h2>Test Form - Type here to test</h2>
        <input type="text" id="test-name" placeholder="Test Name" />
        <input type="email" id="test-email" placeholder="Test Email" />
        <textarea id="test-message" placeholder="Test Message"></textarea>
    </div>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Load locales first -->
    <script type="text/babel" src="./src/i18n/locales/en.js"></script>
    <script type="text/babel" src="./src/i18n/locales/es.js"></script>
    
    <!-- Load i18n system -->
    <script type="text/babel" src="./src/i18n/useTranslation.js"></script>

    <script type="text/babel">
        const statusDiv = document.getElementById('status');
        const logDiv = document.getElementById('log');
        
        let lastLanguage = null;
        let languageChanges = 0;
        let formInputs = 0;
        
        function addStatus(message, type = 'success') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = message;
            statusDiv.appendChild(div);
            
            // Keep only last 5 status messages
            while (statusDiv.children.length > 5) {
                statusDiv.removeChild(statusDiv.firstChild);
            }
        }

        function addLog(message) {
            const div = document.createElement('div');
            div.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
            logDiv.appendChild(div);
            
            // Keep only last 15 log messages
            while (logDiv.children.length > 15) {
                logDiv.removeChild(logDiv.firstChild);
            }
            
            // Auto-scroll to bottom
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function checkLanguageState() {
            const currentLang = window.getLanguage ? window.getLanguage() : (window.currentLanguage || 'unknown');
            const localStorageLang = localStorage.getItem('lang') || 'unknown';
            
            // Check for language changes
            if (lastLanguage && lastLanguage !== currentLang) {
                languageChanges++;
                addLog(`⚠️ Language changed from ${lastLanguage} to ${currentLang} (change #${languageChanges})`);
                addStatus(`Language changed: ${lastLanguage} → ${currentLang}`, 'warning');
            }
            
            lastLanguage = currentLang;
            
            // Check for inconsistencies
            if (currentLang !== localStorageLang) {
                addStatus(`❌ Mismatch: current=${currentLang}, localStorage=${localStorageLang}`, 'error');
            } else {
                addStatus(`✅ Language sync: ${currentLang}`, 'success');
            }
            
            return { currentLang, localStorageLang, languageChanges };
        }

        function testFormInteraction() {
            addLog('🧪 Testing form interaction...');
            formInputs++;
            
            // Simulate typing in form fields
            const testName = document.getElementById('test-name');
            const testEmail = document.getElementById('test-email');
            const testMessage = document.getElementById('test-message');
            
            if (testName && testEmail && testMessage) {
                // Simulate typing
                testName.value = 'Test User ' + formInputs;
                testName.dispatchEvent(new Event('input'));
                
                setTimeout(() => {
                    testEmail.value = 'test' + formInputs + '@example.com';
                    testEmail.dispatchEvent(new Event('input'));
                }, 500);
                
                setTimeout(() => {
                    testMessage.value = 'This is test message ' + formInputs;
                    testMessage.dispatchEvent(new Event('input'));
                }, 1000);
                
                addStatus(`✅ Form interaction test #${formInputs} completed`, 'success');
            } else {
                addStatus('❌ Form elements not found', 'error');
            }
        }

        function testLanguageChange() {
            addLog('🔄 Testing language change...');
            
            const currentLang = window.getLanguage ? window.getLanguage() : (window.currentLanguage || 'en');
            const newLang = currentLang === 'es' ? 'en' : 'es';
            
            if (window.setLanguage) {
                window.setLanguage(newLang);
                addStatus(`✅ Language changed to ${newLang}`, 'success');
            } else {
                addStatus('❌ setLanguage function not available', 'error');
            }
        }

        // Monitor language state every 200ms
        setInterval(() => {
            checkLanguageState();
        }, 200);

        // Monitor form input events
        document.addEventListener('input', (e) => {
            if (e.target.id && e.target.id.startsWith('test-')) {
                addLog(`📝 Form input: ${e.target.id} = "${e.target.value}"`);
            }
        });

        // Initial status
        setTimeout(() => {
            addStatus('🚀 Final language test initialized', 'success');
            addLog('Language monitoring started');
        }, 1000);
    </script>
</body>
</html>
