<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Component Availability Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .warning { background-color: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    </style>
</head>
<body>
    <h1>Component Availability Test</h1>
    <div id="test-results"></div>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Load locales first -->
    <script type="text/babel" src="./src/i18n/locales/en.js"></script>
    <script type="text/babel" src="./src/i18n/locales/es.js"></script>
    
    <!-- Load i18n system -->
    <script type="text/babel" src="./src/i18n/useTranslation.js"></script>
    
    <!-- Load components -->
    <script type="text/babel" src="./src/components/Navbar.jsx"></script>
    <script type="text/babel" src="./src/components/Hero.jsx"></script>
    <script type="text/babel" src="./src/components/About.jsx"></script>
    <script type="text/babel" src="./src/components/Skills.jsx"></script>
    <script type="text/babel" src="./src/components/Projects.jsx"></script>
    <script type="text/babel" src="./src/components/Contact.jsx"></script>
    <script type="text/babel" src="./src/components/Footer.jsx"></script>

    <!-- Test Scripts -->
    <script type="text/babel">
        const results = document.getElementById('test-results');
        
        function addResult(message, type = 'success') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            results.appendChild(div);
        }

        // Wait for all scripts to load
        setTimeout(() => {
            addResult('🔍 Testing component availability...', 'info');
            
            // Test all components
            const components = [
                'Navbar', 'Hero', 'About', 'Skills', 'Projects', 'Contact', 'Footer'
            ];
            
            let allComponentsAvailable = true;
            
            components.forEach(component => {
                if (typeof window[component] === 'function') {
                    addResult(`✅ ${component} component is available`);
                    console.log(`${component} component:`, window[component]);
                } else {
                    addResult(`❌ ${component} component is NOT available`, 'error');
                    allComponentsAvailable = false;
                }
            });
            
            // Test React hooks
            if (typeof window.useAppContext === 'function') {
                addResult('✅ useAppContext hook is available');
            } else {
                addResult('❌ useAppContext hook is NOT available', 'error');
                allComponentsAvailable = false;
            }
            
            if (typeof window.useTranslation === 'function') {
                addResult('✅ useTranslation hook is available');
            } else {
                addResult('❌ useTranslation hook is NOT available', 'error');
                allComponentsAvailable = false;
            }
            
            // Test locales
            if (typeof window.en === 'object') {
                addResult('✅ EN locale is available');
                console.log('EN locale keys:', Object.keys(window.en));
            } else {
                addResult('❌ EN locale is NOT available', 'error');
                allComponentsAvailable = false;
            }
            
            if (typeof window.es === 'object') {
                addResult('✅ ES locale is available');
                console.log('ES locale keys:', Object.keys(window.es));
            } else {
                addResult('❌ ES locale is NOT available', 'error');
                allComponentsAvailable = false;
            }
            
            // Summary
            if (allComponentsAvailable) {
                addResult('🎉 All components and hooks are available! Website should work correctly.', 'success');
            } else {
                addResult('⚠️ Some components are missing. Check the errors above.', 'warning');
            }
            
            // Additional info
            addResult(`📊 Total components tested: ${components.length}`, 'info');
            addResult(`📊 Components available: ${components.filter(c => typeof window[c] === 'function').length}`, 'info');
            addResult(`📊 Components missing: ${components.filter(c => typeof window[c] !== 'function').length}`, 'info');
            
        }, 2000);
    </script>
</body>
</html>
