<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Button Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .debug { background-color: #f8f9fa; color: #495057; border: 1px solid #dee2e6; font-family: monospace; }
    </style>
</head>
<body>
    <h1>Language Button Test</h1>
    <div id="results"></div>
    
    <div class="test-section">
        <h2>Language State Test</h2>
        <button class="btn-primary" onclick="testLanguageState()">Test Language State</button>
        <button class="btn-secondary" onclick="simulateLanguageChange()">Simulate Language Change</button>
        <button class="btn-secondary" onclick="testContextSync()">Test Context Sync</button>
        <div id="debug-output"></div>
    </div>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Load locales first -->
    <script type="text/babel" src="./src/i18n/locales/en.js"></script>
    <script type="text/babel" src="./src/i18n/locales/es.js"></script>
    
    <!-- Load i18n system -->
    <script type="text/babel" src="./src/i18n/useTranslation.js"></script>

    <script type="text/babel">
        const results = document.getElementById('results');
        const debugOutput = document.getElementById('debug-output');
        
        function addResult(message, type = 'success') {
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.textContent = message;
            results.appendChild(div);
        }

        function addDebug(message) {
            const div = document.createElement('div');
            div.className = `result debug`;
            div.textContent = message;
            debugOutput.appendChild(div);
        }

        function testLanguageState() {
            addResult('🔍 Testing language state...', 'info');
            
            // Check global state
            addDebug(`window.currentLanguage: ${window.currentLanguage}`);
            addDebug(`localStorage lang: ${localStorage.getItem('lang')}`);
            
            // Check if locales are loaded
            if (window.en && window.es) {
                addResult('✅ Locales loaded');
                addDebug(`EN nav.home: ${window.en.nav?.home}`);
                addDebug(`ES nav.home: ${window.es.nav?.home}`);
            } else {
                addResult('❌ Locales not loaded', 'error');
            }
            
            // Test translation function
            if (typeof window.t === 'function') {
                addResult('✅ Translation function available');
                
                // Test current language
                const currentLang = window.currentLanguage || 'en';
                const testKey = 'nav.home';
                const translation = window.t(testKey);
                addDebug(`Current lang: ${currentLang}, Translation for ${testKey}: ${translation}`);
            } else {
                addResult('❌ Translation function not available', 'error');
            }
        }

        function simulateLanguageChange() {
            addResult('🔄 Simulating language change...', 'info');
            
            // Simulate changing language
            const newLang = window.currentLanguage === 'en' ? 'es' : 'en';
            window.currentLanguage = newLang;
            localStorage.setItem('lang', newLang);
            
            addDebug(`Changed to: ${newLang}`);
            addDebug(`window.currentLanguage: ${window.currentLanguage}`);
            addDebug(`localStorage lang: ${localStorage.getItem('lang')}`);
            
            // Test translation after change
            const testKey = 'nav.home';
            const translation = window.t(testKey);
            addDebug(`Translation after change: ${translation}`);
            
            addResult(`✅ Language changed to ${newLang}`);
        }

        function testContextSync() {
            addResult('🔗 Testing context synchronization...', 'info');
            
            // Check if AppContext is available
            if (typeof window.AppContext !== 'undefined') {
                addResult('✅ AppContext available');
            } else {
                addResult('❌ AppContext not available', 'error');
            }
            
            // Check if useAppContext is available
            if (typeof window.useAppContext === 'function') {
                addResult('✅ useAppContext available');
            } else {
                addResult('❌ useAppContext not available', 'error');
            }
            
            // Check if useTranslation is available
            if (typeof window.useTranslation === 'function') {
                addResult('✅ useTranslation available');
            } else {
                addResult('❌ useTranslation not available', 'error');
            }
            
            // Test global variables
            addDebug(`window.AppContext: ${typeof window.AppContext}`);
            addDebug(`window.useAppContext: ${typeof window.useAppContext}`);
            addDebug(`window.useTranslation: ${typeof window.useTranslation}`);
            addDebug(`window.t: ${typeof window.t}`);
        }

        // Auto-test on load
        setTimeout(() => {
            addResult('🚀 Starting language button tests...', 'info');
            testLanguageState();
            testContextSync();
        }, 1000);
    </script>
</body>
</html>
