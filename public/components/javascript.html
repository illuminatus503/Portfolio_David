<!--
  JavaScript Component - Reusable functionality
  
  Description:
    Contains all JavaScript functionality for the portfolio.
    This component should be included at the end of the body.
    
  Usage:
    Include this file at the end of the body in your HTML files.
    Update functionality as needed.
    
  Maintenance:
    - Keep all comments and content in English
    - Maintain consistent function naming
    - Test functionality across browsers
-->
<script>
  // Language functionality
  const defaultLang = localStorage.getItem('lang') || (navigator.language.startsWith('es') ? 'es' : 'en');
  let currentLang = defaultLang;
  
  function applyTranslations() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      el.textContent = translations[currentLang][key];
    });
    document.getElementById('lang-toggle').textContent = translations[currentLang].toggle_lang;
  }
  
  // Theme functionality
  function initializeTheme() {
    const savedTheme = localStorage.getItem('theme');
    const themeToggle = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');

    // Apply initial theme based on system preference or saved preference
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (savedTheme === 'light') {
      document.body.classList.add('theme-light');
      themeIcon.textContent = '☀️';
    } else if (savedTheme === 'dark') {
      document.body.classList.add('theme-dark');
      themeIcon.textContent = '🌙';
    } else { // No saved theme, use system preference
      if (prefersDark) {
        document.body.classList.add('theme-dark');
        themeIcon.textContent = '🌙';
      } else {
        document.body.classList.add('theme-light');
        themeIcon.textContent = '☀️';
      }
    }

    themeToggle.addEventListener('click', () => {
      const isLight = document.body.classList.contains('theme-light');

      if (isLight) {
        document.body.classList.remove('theme-light');
        document.body.classList.add('theme-dark');
        localStorage.setItem('theme', 'dark');
        themeIcon.textContent = '🌙';
      } else {
        document.body.classList.remove('theme-dark');
        document.body.classList.add('theme-light');
        localStorage.setItem('theme', 'light');
        themeIcon.textContent = '☀️';
      }

      // Track theme change
      if (typeof gtag !== 'undefined') {
        gtag('event', 'theme_change', {
          theme: isLight ? 'dark' : 'light'
        });
      }
    });
  }
  
  // Scroll Spy functionality
  function initializeScrollSpy() {
    const sections = document.querySelectorAll('section[id]');
    const navLinks = document.querySelectorAll('.nav-link');
    
    window.addEventListener('scroll', () => {
      let current = '';
      sections.forEach(section => {
        const sectionTop = section.offsetTop;
        const sectionHeight = section.clientHeight;
        if (scrollY >= (sectionTop - 200)) {
          current = section.getAttribute('id');
        }
      });
      
      navLinks.forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('href') === `#${current}`) {
          link.classList.add('active');
        }
      });
    });
  }
  
  // Initialize animations
  function initializeAnimations() {
    const observerOptions = {
      threshold: 0.1,
      rootMargin: '0px 0px -50px 0px'
    };
    
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('loading');
        }
      });
    }, observerOptions);
    
    document.querySelectorAll('section').forEach(section => {
      observer.observe(section);
    });
  }
  
  // Load GitHub data
  async function loadGitHubData() {
    try {
      const username = 'illuminatus503';
      
      // Load user stats
      const userResponse = await fetch(`https://api.github.com/users/${username}`);
      const userData = await userResponse.json();
      
      document.getElementById('github-repos').textContent = userData.public_repos || 0;
      
      // Load repositories
      const reposResponse = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=6`);
      const reposData = await reposResponse.json();
      
      let totalStars = 0;
      reposData.forEach(repo => {
        totalStars += repo.stargazers_count || 0;
      });
      
      document.getElementById('github-stars').textContent = totalStars;
      
      // Load dynamic projects
      const projectsContainer = document.getElementById('github-projects');
      projectsContainer.innerHTML = '';
      
      reposData.forEach(repo => {
        if (!repo.fork && repo.description) {
          const projectCard = createProjectCard(repo);
          projectsContainer.appendChild(projectCard);
        }
      });
      
    } catch (error) {
      console.error('Error loading GitHub data:', error);
    }
  }
  
  function createProjectCard(repo) {
    const card = document.createElement('div');
    card.className = 'project-card bg-primary rounded-lg shadow overflow-hidden';
    
    const language = repo.language || 'Other';
    const stars = repo.stargazers_count || 0;
    const forks = repo.forks_count || 0;
    
    card.innerHTML = `
      <div class="p-6">
        <div class="flex justify-between items-start mb-2">
          <h3 class="text-xl font-semibold">${repo.name}</h3>
          <div class="flex items-center space-x-2 text-sm text-textMuted">
            <span>⭐ ${stars}</span>
            <span>🔀 ${forks}</span>
          </div>
        </div>
        <p class="text-textMuted mb-4">${repo.description || 'Sin descripción disponible'}</p>
        <div class="flex flex-wrap gap-2 mb-4">
          <span class="px-2 py-1 bg-accent/20 text-accent text-xs rounded">${language}</span>
          ${repo.topics ? repo.topics.slice(0, 3).map(topic => 
            `<span class="px-2 py-1 bg-accent/20 text-accent text-xs rounded">${topic}</span>`
          ).join('') : ''}
        </div>
        <a href="${repo.html_url}" target="_blank" class="inline-block text-accent hover:underline">Ver en GitHub →</a>
      </div>
    `;
    
    return card;
  }
  
  // Particles animation
  function initializeParticles() {
    const particlesContainer = document.getElementById('particles');
    if (!particlesContainer) return;
    
    const particleCount = 50;
    const particles = [];
    
    // Create particles
    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.className = 'absolute w-1 h-1 bg-accent/30 rounded-full';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.top = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 5 + 's';
      particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
      particle.style.animation = 'float linear infinite';
      
      particlesContainer.appendChild(particle);
      particles.push(particle);
    }
  }
  
  // Analytics tracking
  function initializeAnalytics() {
    // Track page views
    if (typeof gtag !== 'undefined') {
      gtag('event', 'page_view', {
        page_title: document.title,
        page_location: window.location.href
      });
    }
    
    // Track section interactions
    const sections = document.querySelectorAll('section[id]');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting && typeof gtag !== 'undefined') {
          gtag('event', 'section_view', {
            section_name: entry.target.id,
            section_title: entry.target.querySelector('h2')?.textContent || entry.target.id
          });
        }
      });
    }, { threshold: 0.5 });
    
    sections.forEach(section => observer.observe(section));
    
    // Track link clicks
    document.querySelectorAll('a[href^="http"]').forEach(link => {
      link.addEventListener('click', () => {
        if (typeof gtag !== 'undefined') {
          gtag('event', 'click_external_link', {
            link_url: link.href,
            link_text: link.textContent
          });
        }
      });
    });
    
    // Track form submissions
    const contactForm = document.getElementById('contact-form');
    if (contactForm) {
      contactForm.addEventListener('submit', () => {
        if (typeof gtag !== 'undefined') {
          gtag('event', 'form_submit', {
            form_name: 'contact_form'
          });
        }
      });
    }
  }
  
  // Mobile menu functionality
  function initializeMobileMenu() {
    const menuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    
    menuBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
      
      // Update button icon
      const svg = menuBtn.querySelector('svg');
      if (mobileMenu.classList.contains('hidden')) {
        svg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>';
        menuBtn.setAttribute('aria-label', 'Abrir menú de navegación');
      } else {
        svg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>';
        menuBtn.setAttribute('aria-label', 'Cerrar menú de navegación');
      }
    });
    
    // Close menu when clicking on a link
    mobileMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.add('hidden');
        const svg = menuBtn.querySelector('svg');
        svg.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>';
        menuBtn.setAttribute('aria-label', 'Abrir menú de navegación');
      });
    });
  }
  
  // Contact form functionality
  function initializeContactForm() {
    const form = document.getElementById('contact-form');
    const status = document.getElementById('form-status');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = new FormData(form);
      const data = {
        name: formData.get('name'),
        email: formData.get('email'),
        subject: formData.get('subject'),
        message: formData.get('message')
      };
      
      // Show loading state
      const submitBtn = form.querySelector('button[type="submit"]');
      const originalText = submitBtn.textContent;
      submitBtn.textContent = 'Enviando...';
      submitBtn.disabled = true;
      
      try {
        // Simulate form submission (replace with actual endpoint)
        await new Promise(resolve => setTimeout(resolve, 2000));
        
        // Show success message
        status.className = 'mt-4 text-center text-green-400';
        status.textContent = '¡Mensaje enviado con éxito! Te responderé pronto.';
        status.classList.remove('hidden');
        
        // Reset form
        form.reset();
        
      } catch (error) {
        // Show error message
        status.className = 'mt-4 text-center text-red-400';
        status.textContent = 'Error al enviar el mensaje. Por favor, inténtalo de nuevo.';
        status.classList.remove('hidden');
      } finally {
        // Reset button
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
        
        // Hide status after 5 seconds
        setTimeout(() => {
          status.classList.add('hidden');
        }, 5000);
      }
    });
  }
  
  // Initialize everything when DOM is loaded
  document.addEventListener('DOMContentLoaded', () => {
    applyTranslations();
    initializeScrollSpy();
    initializeAnimations();
    initializeTheme();
    loadGitHubData();
    initializeContactForm();
    initializeMobileMenu();
    initializeAnalytics();
    initializeParticles();
    
    // Language toggle
    document.getElementById('lang-toggle').addEventListener('click', () => {
      currentLang = currentLang === 'es' ? 'en' : 'es';
      localStorage.setItem('lang', currentLang);
      applyTranslations();
    });
    
    // Update year in footer
    document.getElementById('year').textContent = new Date().getFullYear();
  });
</script>
