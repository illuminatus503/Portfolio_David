<!--
  Navbar Component - Reusable navigation bar
  
  Description:
    Contains the main navigation bar with language and theme toggles.
    This component should be included after the body tag.
    
  Usage:
    Include this file after the body tag in your HTML files.
    Update navigation links as needed.
    
  Maintenance:
    - Keep all comments and content in English
    - Maintain consistent navigation structure
    - Update links when adding new sections
-->
<!-- Botón idioma (z-index más alto para evitar quedar debajo del nav) -->
<button id="lang-toggle" class="fixed top-4 right-4 z-50 bg-secondary px-3 py-1 rounded hover:bg-secondary/80 transition" 
        aria-label="Cambiar idioma" title="Cambiar idioma"></button>

<!-- Theme toggle button -->
<button id="theme-toggle" class="fixed top-4 right-20 z-50 bg-secondary px-3 py-1 rounded hover:bg-secondary/80 transition" 
        aria-label="Cambiar tema" title="Cambiar tema">
  <span id="theme-icon">🌙</span>
</button>

<!-- Navbar -->
<nav class="fixed inset-x-0 top-0 z-30 bg-primary bg-opacity-90 border-b border-secondary backdrop-blur-md">
  <div class="container mx-auto flex justify-between items-center px-6 py-4">
    <a href="#home" class="text-2xl font-display font-semibold" data-i18n="nav_home" aria-label="Ir al inicio"></a>
    <div class="space-x-6 hidden md:flex">
      <a href="#about" class="nav-link hover:text-accent transition" data-i18n="nav_about"></a>
      <a href="#skills" class="nav-link hover:text-accent transition" data-i18n="nav_skills"></a>
      <a href="#projects" class="nav-link hover:text-accent transition" data-i18n="nav_projects"></a>
      <a href="#contact" class="nav-link hover:text-accent transition" data-i18n="nav_contact"></a>
    </div>
    
    <!-- Mobile menu button -->
    <button id="mobile-menu-btn" class="md:hidden p-2 rounded hover:bg-secondary/50 transition" aria-label="Abrir menú de navegación">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
    </button>
  </div>
  
  <!-- Mobile menu -->
  <div id="mobile-menu" class="md:hidden hidden bg-primary border-t border-secondary">
    <div class="px-6 py-4 space-y-4">
      <a href="#about" class="block py-2 hover:text-accent transition" data-i18n="nav_about"></a>
      <a href="#skills" class="block py-2 hover:text-accent transition" data-i18n="nav_skills"></a>
      <a href="#projects" class="block py-2 hover:text-accent transition" data-i18n="nav_projects"></a>
      <a href="#contact" class="block py-2 hover:text-accent transition" data-i18n="nav_contact"></a>
    </div>
  </div>
</nav>
