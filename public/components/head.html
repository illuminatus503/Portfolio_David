<!-- Tailwind CSS via CDN with fallback -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  // Fallback if CDN fails
  if (typeof tailwind === 'undefined') {
    console.warn('Tailwind CDN failed to load, using fallback styles');
    document.head.insertAdjacentHTML('beforeend', `
      <style>
        /* Basic fallback styles */
        body { font-family: system-ui, sans-serif; margin: 0; padding: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
        .bg-primary { background-color: #0d0d0d; }
        .bg-secondary { background-color: #1f1f1f; }
        .text-accent { color: #6366f1; }
        .text-textLight { color: #f3f4f6; }
        .text-textMuted { color: #9ca3af; }
      </style>
    `);
  }
</script>

</script>
