  Description:

  Usage:

<style>
  @keyframes blink {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }
  .cursor::after {
    content: '|';
    animation: blink 1s step-end infinite;
    margin-left: 2px;
  }
  
  /* Scroll Spy Styles */
  .nav-link {
    position: relative;
    transition: color 0.3s ease;
  }
  
  .nav-link.active {
    color: #6366f1;
  }
  
  .nav-link.active::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 0;
    width: 100%;
    height: 2px;
    background-color: #6366f1;
    animation: slideIn 0.3s ease;
  }
  
  @keyframes slideIn {
    from { transform: scaleX(0); }
    to { transform: scaleX(1); }
  }
  
  /* Smooth scrolling */
  html {
    scroll-behavior: smooth;
  }
  
  /* Loading animation */
  .loading {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.6s ease forwards;
  }
  
  @keyframes fadeInUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  
  /* Hover effects */
  .skill-card {
    transition: all 0.3s ease;
  }
  
  .skill-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(99, 102, 241, 0.2);
  }
  
  .project-card {
    transition: all 0.3s ease;
  }
  
  .project-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
  }
  
  /* Theme variables */
  :root {
    --color-bg-light: #fff;
    --color-bg-dark: #101014;
    --color-text-light: #18181b;
    --color-text-dark: #f3f4f6;
    --color-accent: #6366f1;
    --color-muted-light: #a1a1aa;
    --color-muted-dark: #52525b;
    --color-border-light: #e5e7eb;
    --color-border-dark: #232336;
  }
  
  /* Light theme styles */
  .theme-light {
    --bg-primary: #ffffff;
    --bg-secondary: #f8fafc;
    --text-primary: #1f2937;
    --text-muted: #6b7280;
    --border-color: #e5e7eb;
  }
  
  .theme-light .bg-primary { background-color: var(--bg-primary); }
  .theme-light .bg-secondary { background-color: var(--bg-secondary); }
  .theme-light .text-textLight { color: var(--text-primary); }
  .theme-light .text-textMuted { color: var(--text-muted); }
  .theme-light .border-secondary { border-color: var(--border-color); }
  
  /* Smooth theme transition */
  body {
    transition: background-color 0.3s ease, color 0.3s ease;
  }
  
  /* Loading spinner */
  .loading-spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255,255,255,.3);
    border-radius: 50%;
    border-top-color: #fff;
    animation: spin 1s ease-in-out infinite;
  }
  
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  
  /* Base styles */
  body {
    font-family: 'Inter', 'Poppins', sans-serif;
    background: var(--color-bg-dark);
    color: var(--color-text-dark);
    transition: background 0.3s, color 0.3s;
    min-height: 100vh;
    margin: 0;
  }
  
  @media (prefers-color-scheme: light) {
    body:not(.theme-dark):not(.theme-light) {
      background: var(--color-bg-light);
      color: var(--color-text-light);
    }
  }
  @media (prefers-color-scheme: dark) {
    body:not(.theme-dark):not(.theme-light) {
      background: var(--color-bg-dark);
      color: var(--color-text-dark);
    }
  }
  body.theme-light {
    background: var(--color-bg-light);
    color: var(--color-text-light);
  }
  body.theme-dark {
    background: var(--color-bg-dark);
    color: var(--color-text-dark);
  }
  
  /* Minimal, modern UI */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 1.5rem;
  }

    border: none;
    box-shadow: none;

  }

    margin-top: 0.5rem;

  }
  .accent {
    color: var(--color-accent);
  }
  .muted {
    color: var(--color-muted-dark);
  }
  body.theme-light .muted {

  }
  .btn {

    border: 1px solid var(--color-border-dark);
  }
  body.theme-light .card {

  }
  .skills-list, .projects-list {

  }
  .skills-list li, .projects-list li {

  }
  .footer {

  }
  
  /* Hide scrollbars for a cleaner look */
  ::-webkit-scrollbar {
    width: 8px;
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: rgba(99,102,241,0.15);
    border-radius: 8px;
  }
  
  /* Particles animation */
  @keyframes float {
    0%, 100% {
      transform: translateY(0px) translateX(0px);
      opacity: 0.3;
    }
    25% {
      transform: translateY(-20px) translateX(10px);
      opacity: 0.6;
    }
    50% {
      transform: translateY(-40px) translateX(-10px);
      opacity: 0.8;
    }
    75% {
      transform: translateY(-20px) translateX(10px);
      opacity: 0.6;
    }
  }
</style>
