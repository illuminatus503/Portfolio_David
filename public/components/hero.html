<!--
  Hero Component - Reusable hero section
  
  Description:
    Contains the main hero section with profile image, name, role, and CTA.
    This component should be included after the navbar.
    
  Usage:
    Include this file after the navbar component in your HTML files.
    Update profile image and content as needed.
    
  Maintenance:
    - Keep all comments and content in English
    - Update profile image URL when needed
    - Maintain consistent styling
-->
<!-- Hero -->
<section id="home" class="h-screen flex flex-col justify-center items-center text-center px-6 pt-20 relative overflow-hidden">
  <!-- Animated background particles -->
  <div id="particles" class="absolute inset-0 pointer-events-none"></div>
  
  <img src="https://avatars.githubusercontent.com/u/22548652?v=4" alt="David Fernández-Cuenca Marcos - Foto de perfil" class="w-32 h-32 rounded-full mb-4 ring-2 ring-accent relative z-10" loading="lazy" />
  <h1 class="text-4xl md:text-6xl font-display font-semibold mb-2 relative z-10" data-i18n="hero_name"></h1>
  <p class="text-xl md:text-2xl opacity-80 mb-4 relative z-10" data-i18n="hero_role"></p>
  <p class="italic text-lg md:text-xl opacity-70 mb-8 cursor relative z-10" data-i18n="hero_tagline"></p>
  <a href="#contact" class="px-8 py-3 border-2 border-accent rounded-full hover:bg-accent hover:text-white transition focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2 relative z-10" data-i18n="hero_cta" aria-label="Ir a la sección de contacto"></a>
</section>
