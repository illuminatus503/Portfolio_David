<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Contact Form</title>
    <link rel="stylesheet" href="./dist/output.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <div id="root"></div>
    
    <!-- Load all dependencies -->
    <script type="text/babel" src="./src/mock-data.js"></script>
    <script type="text/babel" src="./src/i18n/locales/en.js"></script>
    <script type="text/babel" src="./src/i18n/locales/es.js"></script>
    <script type="text/babel" src="./src/i18n/useTranslation.js"></script>
    <script type="text/babel" src="./src/config/environment.js"></script>
    <script type="text/babel" src="./src/validation.js"></script>
    
    <script type="text/babel">
        // Mock App Context for testing
        const AppContext = React.createContext();
        
        function MockAppProvider({ children }) {
            const [theme, setTheme] = React.useState('dark');
            const [language, setLanguage] = React.useState('es');
            
            const value = {
                theme,
                setTheme,
                language,
                setLanguage
            };
            
            return React.createElement(AppContext.Provider, { value }, children);
        }
        
        // Make useAppContext available
        window.useAppContext = () => React.useContext(AppContext);
        window.AppContext = AppContext;
        
        // Initialize language
        if (window.setLanguage) {
            window.setLanguage('es');
        }
    </script>
    
    <!-- Load Contact component -->
    <script type="text/babel" src="./src/components/Contact.jsx"></script>
    
    <script type="text/babel">
        function TestApp() {
            return (
                <MockAppProvider>
                    <div className="max-w-4xl mx-auto">
                        <h1 className="text-3xl font-bold mb-8 text-center">
                            🧪 Test del Formulario de Contacto
                        </h1>
                        
                        <div className="bg-blue-500/20 border border-blue-500/50 rounded-lg p-4 mb-8">
                            <h2 className="text-lg font-semibold mb-2">🔧 Modo de Debug</h2>
                            <p className="text-sm">
                                • Abre las DevTools (F12) para ver los logs<br/>
                                • El formulario simula envío exitoso en desarrollo<br/>
                                • Los mensajes se guardan en localStorage<br/>
                                • Revisa la consola para ver todo el proceso
                            </p>
                        </div>
                        
                        <Contact />
                        
                        <div className="mt-8 p-4 bg-gray-800 rounded-lg">
                            <h3 className="text-lg font-semibold mb-4">💾 Mensajes Enviados (localStorage)</h3>
                            <div id="submissions-list" className="text-sm">
                                <em>Los mensajes aparecerán aquí después de enviar...</em>
                            </div>
                            <button 
                                onClick={() => {
                                    localStorage.removeItem('contactSubmissions');
                                    document.getElementById('submissions-list').innerHTML = '<em>Mensajes borrados</em>';
                                }}
                                className="mt-4 px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition"
                            >
                                🗑️ Limpiar Mensajes
                            </button>
                        </div>
                    </div>
                </MockAppProvider>
            );
        }
        
        // Render the test app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TestApp />);
        
        // Update submissions display
        function updateSubmissionsList() {
            const submissions = JSON.parse(localStorage.getItem('contactSubmissions') || '[]');
            const listElement = document.getElementById('submissions-list');
            
            if (submissions.length === 0) {
                listElement.innerHTML = '<em>No hay mensajes aún</em>';
                return;
            }
            
            listElement.innerHTML = submissions.map((sub, i) => `
                <div class="mb-2 p-2 bg-gray-700 rounded">
                    <strong>${sub.name}</strong> (${sub.email})<br/>
                    <strong>Asunto:</strong> ${sub.subject}<br/>
                    <strong>Mensaje:</strong> ${sub.message}<br/>
                    <small class="text-gray-400">${new Date(sub.timestamp).toLocaleString()}</small>
                </div>
            `).join('');
        }
        
        // Update list every 2 seconds
        setInterval(updateSubmissionsList, 2000);
        updateSubmissionsList();
    </script>
</body>
</html>
