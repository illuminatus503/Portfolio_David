<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Admin Panel</title>
    <link rel="stylesheet" href="./dist/output.css">
  </head>
  <body>
    <div id="root"></div>
    
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Admin Components -->
    <script type="text/babel" src="./src/components/Admin.jsx"></script>
    <script type="text/babel" src="./src/components/GitHubRepos.jsx"></script>
    <script type="text/babel" src="./src/components/SEO.jsx"></script>
    <script type="text/babel" src="./src/components/GoogleAnalytics.jsx"></script>
    <script type="text/babel" src="./src/AdminApp.jsx"></script>
    
    <!-- Test Script -->
    <script type="text/babel">
      // Simple test to verify AdminApp renders
      console.log('Testing AdminApp...');
      console.log('AdminApp available:', typeof window.AdminApp);
      console.log('Admin available:', typeof window.Admin);
      
      try {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
        console.log('AdminApp rendered successfully');
      } catch (error) {
        console.error('Error rendering AdminApp:', error);
        document.getElementById('root').innerHTML = `
          <div style="padding: 20px; color: red;">
            <h1>Error rendering AdminApp</h1>
            <pre>${error.message}</pre>
            <h2>Available components:</h2>
            <ul>
              <li>AdminApp: ${typeof window.AdminApp}</li>
              <li>Admin: ${typeof window.Admin}</li>
              <li>React: ${typeof React}</li>
              <li>ReactDOM: ${typeof ReactDOM}</li>
            </ul>
          </div>
        `;
      }
    </script>
  </body>
</html>
