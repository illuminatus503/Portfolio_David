<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#6366f1" stroke="#4f46e5" stroke-width="1"/>
  
  <!-- Robot head -->
  <rect x="8" y="6" width="16" height="20" rx="3" fill="#ffffff" stroke="#6366f1" stroke-width="1"/>
  
  <!-- Robot eyes -->
  <circle cx="12" cy="14" r="2" fill="#6366f1"/>
  <circle cx="20" cy="14" r="2" fill="#6366f1"/>
  
  <!-- Robot mouth -->
  <rect x="13" y="18" width="6" height="2" rx="1" fill="#6366f1"/>
  
  <!-- Robot antenna -->
  <line x1="16" y1="6" x2="16" y2="2" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  <circle cx="16" cy="2" r="1.5" fill="#6366f1"/>
  
  <!-- Code symbols -->
  <text x="16" y="26" text-anchor="middle" font-family="monospace" font-size="3" fill="#6366f1" font-weight="bold">&lt;/&gt;</text>
</svg> 